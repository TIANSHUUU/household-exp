<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>购物清单</title>
  <link rel="preconnect" href="https://mpvsbeghuueffkjdemcr.supabase.co">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f2f2f7; --card: #ffffff; --text: #1c1c1e; --sub: #6c6c70;
      --border: #e5e5ea; --accent: #007aff; --green: #34c759;
      --orange: #ff9500; --red: #ff3b30;
      --shadow: 0 1px 8px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.04);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000; --card: #1c1c1e; --text: #ffffff; --sub: #8e8e93;
        --border: #2c2c2e;
        --shadow: 0 1px 8px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; -webkit-font-smoothing: antialiased;
    }

    /* ── Lock ── */
    #lock-screen {
      position: fixed; inset: 0; background: var(--bg); z-index: 9999;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    #lock-screen.hidden { display: none; }
    .lock-card {
      background: var(--card); border-radius: 22px; padding: 36px 28px 28px;
      width: 100%; max-width: 340px; box-shadow: var(--shadow); text-align: center;
    }
    .lock-icon  { font-size: 48px; margin-bottom: 14px; }
    .lock-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .lock-sub   { font-size: 14px; color: var(--sub); margin-bottom: 26px; }
    .lock-input {
      width: 100%; padding: 14px 16px; border: 1.5px solid var(--border);
      border-radius: 12px; font-size: 18px; font-family: inherit;
      background: var(--bg); color: var(--text); text-align: center;
      letter-spacing: 3px; outline: none; transition: border-color 0.2s; margin-bottom: 12px;
    }
    .lock-input:focus { border-color: var(--accent); }
    .lock-input.error { border-color: var(--red); animation: shake 0.35s ease; }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)}
      40%{transform:translateX(8px)}   60%{transform:translateX(-5px)}
      80%{transform:translateX(5px)}
    }
    .lock-error { font-size: 13px; color: var(--red); margin-bottom: 10px; min-height: 18px; }
    .lock-btn {
      width: 100%; padding: 14px; background: var(--accent); color: #fff;
      border: none; border-radius: 12px; font-size: 16px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: opacity 0.15s;
    }
    .lock-btn:active { opacity: 0.8; }

    /* ── App ── */
    #app { display: none; padding-bottom: 100px; }
    #app.visible { display: block; }

    /* ── Loading ── */
    .loading-wrap {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 60px 20px; color: var(--sub); gap: 14px;
    }
    .spinner {
      width: 28px; height: 28px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Topbar ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(242,242,247,0.85);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--border); padding: 14px 20px 12px;
    }
    @media (prefers-color-scheme: dark) { .topbar { background: rgba(0,0,0,0.85); } }
    .topbar-inner {
      max-width: 600px; margin: 0 auto;
      display: flex; justify-content: space-between; align-items: center;
    }
    .topbar h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .topbar-actions { display: flex; gap: 8px; }
    .icon-btn {
      background: none; border: none; cursor: pointer; color: var(--accent);
      font-size: 14px; font-weight: 500; padding: 5px 10px; border-radius: 8px;
      transition: background 0.15s; text-decoration: none; display: inline-block;
    }
    .icon-btn:hover { background: rgba(0,122,255,0.1); }
    .sync-dot {
      display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      margin-left: 6px; vertical-align: middle; transition: background 0.3s;
    }
    .sync-dot.ok   { background: var(--green); }
    .sync-dot.busy { background: var(--orange); animation: pulse 1s infinite; }
    .sync-dot.err  { background: var(--red); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── Container ── */
    .wrap { max-width: 600px; margin: 0 auto; padding: 16px 16px 0; }

    /* ── New-list button ── */
    .add-row { margin-bottom: 16px; }
    .add-main-btn {
      width: 100%; padding: 15px; background: var(--card);
      border: 1.5px dashed rgba(0,122,255,0.45); border-radius: 14px;
      color: var(--accent); font-size: 15px; font-weight: 600; font-family: inherit;
      cursor: pointer; box-shadow: var(--shadow);
      display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: background 0.15s, border-color 0.15s;
    }
    .add-main-btn:hover  { background: rgba(0,122,255,0.05); border-color: var(--accent); }
    .add-main-btn:active { opacity: 0.7; }
    .add-main-btn .plus  { font-size: 20px; line-height: 1; }

    /* ── List card ── */
    .list-card {
      background: var(--card); border-radius: 16px; box-shadow: var(--shadow);
      margin-bottom: 16px; overflow: hidden;
    }
    .list-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid var(--border); gap: 10px;
    }
    .list-name { font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 8px; min-width: 0; }
    .list-name .emoji { flex-shrink: 0; }
    .list-name .txt { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: text; }
    .edit-list-input {
      width: 100%; padding: 4px 8px; border: 1.5px solid var(--accent); border-radius: 8px;
      font-size: 17px; font-weight: 700; font-family: inherit; background: var(--card); color: var(--text); outline: none;
    }
    .list-count { font-size: 12px; color: var(--sub); font-weight: 500; flex-shrink: 0; }
    .done-btn {
      flex-shrink: 0; background: rgba(52,199,89,0.12); color: var(--green); border: none;
      border-radius: 9px; padding: 7px 12px; font-size: 13px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: background 0.15s; white-space: nowrap;
    }
    .done-btn:hover { background: rgba(52,199,89,0.22); }

    .sitem { display: flex; align-items: center; padding: 11px 14px; gap: 12px; }
    .sitem:not(:last-child) { border-bottom: 1px solid var(--border); }
    .grip {
      flex-shrink: 0; cursor: grab; color: var(--sub); opacity: 0.35;
      font-size: 16px; line-height: 1; user-select: none; touch-action: none;
    }
    .grip:active { cursor: grabbing; }
    .sitem.dragging { opacity: 0.4; }
    .sitem.drop-before { box-shadow: inset 0 2px 0 0 var(--accent); }
    .sitem.drop-after  { box-shadow: inset 0 -2px 0 0 var(--accent); }
    .check {
      width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border);
      flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s; color: #fff; font-size: 13px; font-weight: 700;
    }
    .check.on { background: var(--green); border-color: var(--green); }
    .sitem-name { flex: 1; font-size: 15px; min-width: 0; word-break: break-word; transition: color 0.15s; cursor: text; }
    .sitem.checked .sitem-name { text-decoration: line-through; color: var(--sub); }
    .edit-item-input {
      width: 100%; padding: 4px 8px; border: 1.5px solid var(--accent); border-radius: 8px;
      font-size: 15px; font-family: inherit; background: var(--card); color: var(--text); outline: none;
    }
    .sdel {
      background: none; border: none; cursor: pointer; color: var(--sub);
      font-size: 20px; line-height: 1; padding: 4px 6px; border-radius: 6px;
      opacity: 0.4; transition: opacity 0.15s, color 0.15s; flex-shrink: 0;
    }
    .sdel:hover { opacity: 1; color: var(--red); }

    .add-item-row { display: flex; align-items: center; padding: 10px 14px; gap: 10px; background: var(--bg); }
    .add-item-input {
      flex: 1; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 15px; font-family: inherit; background: var(--card); color: var(--text); outline: none;
      transition: border-color 0.2s;
    }
    .add-item-input:focus { border-color: var(--accent); }
    .add-item-btn {
      flex-shrink: 0; background: var(--accent); color: #fff; border: none; border-radius: 10px;
      width: 38px; height: 38px; font-size: 22px; line-height: 1; cursor: pointer; transition: opacity 0.15s;
    }
    .add-item-btn:active { opacity: 0.75; }

    /* ── Empty ── */
    .empty { text-align: center; padding: 48px 20px; color: var(--sub); }
    .empty-icon { font-size: 44px; margin-bottom: 12px; }
    .empty-text { font-size: 15px; line-height: 1.6; }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: 28px; right: 24px;
      width: 58px; height: 58px; border-radius: 50%;
      background: var(--accent); border: none; cursor: pointer;
      color: #fff; font-size: 30px; line-height: 1;
      box-shadow: 0 4px 20px rgba(0,122,255,0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; transition: transform 0.15s, box-shadow 0.15s;
    }
    .fab:active { transform: scale(0.93); box-shadow: 0 2px 10px rgba(0,122,255,0.35); }

    /* ── Sheet ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 400;
      display: flex; align-items: flex-end;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }
    .sheet {
      background: var(--card); border-radius: 20px 20px 0 0;
      padding: 12px 20px 32px; width: 100%; max-width: 600px; margin: 0 auto;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 90vh; overflow-y: auto;
    }
    .overlay.open .sheet { transform: translateY(0); }
    .handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
    .sheet-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }

    /* ── Form ── */
    .fgrp { margin-bottom: 14px; }
    .flabel { display: block; font-size: 12px; font-weight: 600; color: var(--sub); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 7px; }
    .finput {
      width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
      border-radius: 11px; font-size: 16px; font-family: inherit;
      background: var(--bg); color: var(--text); outline: none; transition: border-color 0.2s;
    }
    .finput:focus { border-color: var(--accent); }
    .submit {
      width: 100%; padding: 14px; background: var(--accent); color: #fff;
      border: none; border-radius: 13px; font-size: 16px; font-weight: 600;
      font-family: inherit; cursor: pointer; margin-top: 10px; transition: opacity 0.15s;
    }
    .submit:active   { opacity: 0.8; }
    .submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .finish-clear-btn {
      width: 100%; padding: 13px; margin-top: 10px; background: rgba(255,59,48,0.1); color: var(--red);
      border: none; border-radius: 13px; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer;
      transition: background 0.15s;
    }
    .finish-clear-btn:hover { background: rgba(255,59,48,0.18); }
    .finish-desc { font-size: 14px; color: var(--sub); margin-bottom: 18px; line-height: 1.5; }
  </style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-card">
    <div class="lock-icon">🛒</div>
    <div class="lock-title">购物清单</div>
    <div class="lock-sub">请输入密码以继续</div>
    <input type="password" class="lock-input" id="lock-input"
           placeholder="••••••••" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')unlock()">
    <div class="lock-error" id="lock-error"></div>
    <button class="lock-btn" onclick="unlock()">进入</button>
  </div>
</div>

<div id="app">
  <header class="topbar">
    <div class="topbar-inner">
      <h1>购物清单<span class="sync-dot ok" id="sync-dot"></span></h1>
      <div class="topbar-actions">
        <a class="icon-btn" href="index.html">💰 开支</a>
        <button class="icon-btn" onclick="lockApp()">锁定</button>
      </div>
    </div>
  </header>

  <div class="wrap">
    <div class="add-row">
      <button class="add-main-btn" onclick="openNewList()">
        <span class="plus">＋</span> 新建购物清单
      </button>
    </div>

    <div id="lists"></div>
    <div class="empty" id="empty" style="display:none">
      <div class="empty-icon">🛒</div>
      <div class="empty-text">还没有购物清单<br>点击上方按钮新建一个</div>
    </div>
  </div>
</div>

<!-- New List Sheet -->
<div class="overlay" id="nl-overlay" onclick="overlayClick(event,'nl-overlay')">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title">新建购物清单</div>
    <div class="fgrp">
      <label class="flabel">清单名称</label>
      <input type="text" class="finput" id="nl-name" placeholder="wws / coles / 维妈市场 …"
             onkeydown="if(event.key==='Enter')submitNewList()">
    </div>
    <button class="submit" onclick="submitNewList()">创建</button>
  </div>
</div>

<!-- Finish List Sheet -->
<div class="overlay" id="finish-overlay" onclick="overlayClick(event,'finish-overlay')">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title" id="finish-title">采购完毕</div>
    <div class="finish-desc" id="finish-desc"></div>
    <button class="submit" id="finish-keep-btn" style="background:var(--green)" onclick="finishKeepUnbought()">保留未买、清除已买</button>
    <button class="finish-clear-btn" onclick="finishClearAll()">全部清除整张清单</button>
  </div>
</div>

<button class="fab" onclick="openNewList()">+</button>

<script>
// ── Supabase REST (no SDK) ──
const API = 'https://mpvsbeghuueffkjdemcr.supabase.co/rest/v1';
const KEY = 'sb_publishable_al2tSxbN67a8_frUBnEzYg_dmGNU5g5';
const H   = { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json' };

async function slGetLists() {
  const r = await fetch(`${API}/shopping_lists?select=*&order=id.asc`, { headers: H });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function siGetItems() {
  const r = await fetch(`${API}/shopping_items?select=*&order=id.asc`, { headers: H });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function loadAll() {
  const [ls, its] = await Promise.all([slGetLists(), siGetItems()]);
  return ls.map(l => ({
    id: Number(l.id), name: l.name,
    items: its.filter(i => Number(i.list_id) === Number(l.id))
              .map(i => ({ id: Number(i.id), name: i.name, checked: !!i.checked,
                           position: i.position == null ? Number(i.id) : Number(i.position) }))
              .sort((a, b) => (a.position - b.position) || (a.id - b.id)),
  }));
}
async function slInsertList(name) {
  const r = await fetch(`${API}/shopping_lists`, {
    method: 'POST', headers: { ...H, 'Prefer': 'return=representation' },
    body: JSON.stringify([{ name }]),
  });
  if (!r.ok) throw new Error(await r.text());
  return (await r.json())[0];
}
async function slUpdate(id, name) {
  const r = await fetch(`${API}/shopping_lists?id=eq.${id}`, {
    method: 'PATCH', headers: { ...H, 'Prefer': 'return=minimal' },
    body: JSON.stringify({ name }),
  });
  if (!r.ok) throw new Error(await r.text());
}
async function slDeleteList(id) {
  let r = await fetch(`${API}/shopping_items?list_id=eq.${id}`, { method: 'DELETE', headers: H });
  if (!r.ok) throw new Error(await r.text());
  r = await fetch(`${API}/shopping_lists?id=eq.${id}`, { method: 'DELETE', headers: H });
  if (!r.ok) throw new Error(await r.text());
}
async function siInsertItem(listId, name, position) {
  const r = await fetch(`${API}/shopping_items`, {
    method: 'POST', headers: { ...H, 'Prefer': 'return=representation' },
    body: JSON.stringify([{ list_id: listId, name, position }]),
  });
  if (!r.ok) throw new Error(await r.text());
  return (await r.json())[0];
}
async function siInsertItems(listId, names) {
  const r = await fetch(`${API}/shopping_items`, {
    method: 'POST', headers: { ...H, 'Prefer': 'return=representation' },
    body: JSON.stringify(names.map((n, idx) => ({ list_id: listId, name: n, position: idx }))),
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function siPatch(id, patch) {
  const r = await fetch(`${API}/shopping_items?id=eq.${id}`, {
    method: 'PATCH', headers: { ...H, 'Prefer': 'return=minimal' },
    body: JSON.stringify(patch),
  });
  if (!r.ok) throw new Error(await r.text());
}
const siToggle = (id, checked) => siPatch(id, { checked });
const siUpdate = (id, name)    => siPatch(id, { name });
async function siDeleteItem(id) {
  const r = await fetch(`${API}/shopping_items?id=eq.${id}`, { method: 'DELETE', headers: H });
  if (!r.ok) throw new Error(await r.text());
}
async function siDeleteItems(ids) {
  if (!ids.length) return;
  const r = await fetch(`${API}/shopping_items?id=in.(${ids.join(',')})`, { method: 'DELETE', headers: H });
  if (!r.ok) throw new Error(await r.text());
}

// ── Password (shared with 开支 page via same session key) ──
const PWD_HASH    = '9c2e571eb60385be3ced6e5d4bd7d34837f5219d693e679cd324d5e12b83c4eb';
const SESSION_KEY = 'hh_auth';

async function sha256(s) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function unlock() {
  const inp = document.getElementById('lock-input');
  const err = document.getElementById('lock-error');
  if (!inp.value) { err.textContent = '请输入密码'; return; }
  if (await sha256(inp.value) === PWD_HASH) {
    sessionStorage.setItem(SESSION_KEY, '1');
    document.getElementById('lock-screen').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    err.textContent = '';
    initApp();
  } else {
    err.textContent = '密码错误，请重试';
    inp.classList.add('error');
    inp.value = '';
    setTimeout(() => inp.classList.remove('error'), 400);
  }
}
function lockApp() {
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById('lock-screen').classList.remove('hidden');
  document.getElementById('app').classList.remove('visible');
  document.getElementById('lock-input').value = '';
  document.getElementById('lock-error').textContent = '';
}

// ── Seed (first ever load) ──
const SEED_LIST  = 'wws';
const SEED_ITEMS = [
  'rye sourdough', 'lactose free milk', 'salmon', 'some meats', 'eggs', 'brown rice',
  'organic rolled oats', 'chickpeas', 'cheese', 'greek yoghurt', 'oyster sauce', 'tostitos',
  'swisse iron tablets (2 for 15aud)', 'toothpaste', 'sardine', 'caviar dip', 'burrata?', 'black garlic sauce?',
];

// ── State ──
let lists = [];

function escHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}
function setSyncDot(s) { document.getElementById('sync-dot').className = 'sync-dot ' + s; }

// ── Init ──
async function initApp() {
  showLoading(true);
  await loadLists();
  startPolling();
  showLoading(false);
}
function showLoading(on) {
  if (on) {
    document.getElementById('lists').innerHTML =
      '<div class="loading-wrap"><div class="spinner"></div><span>加载中...</span></div>';
    document.getElementById('empty').style.display = 'none';
  }
}
async function loadLists() {
  setSyncDot('busy');
  try {
    let data = await loadAll();
    if (data.length === 0) {
      const l = await slInsertList(SEED_LIST);
      const inserted = await siInsertItems(l.id, SEED_ITEMS);
      data = [{ id: Number(l.id), name: l.name, items: inserted
        .map(r => ({ id: Number(r.id), name: r.name, checked: !!r.checked,
                     position: r.position == null ? Number(r.id) : Number(r.position) }))
        .sort((a, b) => (a.position - b.position) || (a.id - b.id)) }];
    }
    lists = data;
    setSyncDot('ok');
    render();
  } catch(e) { console.error(e); setSyncDot('err'); }
}

// Poll every 30s — skip while typing a new item to avoid clobbering input
function startPolling() {
  setInterval(async () => {
    if (document.visibilityState !== 'visible') return;
    const ae = document.activeElement;
    if (ae && (ae.classList.contains('add-item-input') || ae.classList.contains('edit-item-input') || ae.classList.contains('edit-list-input') || ae.id === 'nl-name')) return;
    try {
      const fresh = await loadAll();
      if (sig(fresh) !== sig(lists)) { lists = fresh; render(); }
      setSyncDot('ok');
    } catch(e) { setSyncDot('err'); }
  }, 15000);
}
function sig(ls) {
  return ls.map(l => `${l.id}:${l.name}[${l.items.map(i => `${i.id}${i.checked ? 1 : 0}${i.name}:${i.position}`).join(',')}]`).join('|');
}

// ── Render ──
function render() {
  const wrap  = document.getElementById('lists');
  const empty = document.getElementById('empty');
  if (!lists.length) { wrap.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  wrap.innerHTML = lists.map(listCardHtml).join('');
}
function displayItems(l) {
  // unchecked first, checked sink to bottom; within each group keep position order
  return [...l.items].sort((a, b) => (a.checked - b.checked) || (a.position - b.position));
}
function listCardHtml(l) {
  const remaining = l.items.filter(i => !i.checked).length;
  const items = displayItems(l).map(it => `
      <div class="sitem ${it.checked ? 'checked' : ''}" draggable="false"
           ondragstart="dragStart(event,${l.id},${it.id})" ondragover="dragOver(event,${l.id})"
           ondragleave="dragLeave(event)" ondrop="dropItem(event,${l.id},${it.id})" ondragend="dragEnd(event)">
        <span class="grip" title="拖动排序"
              onmousedown="this.closest('.sitem').setAttribute('draggable','true')">⠿</span>
        <div class="check ${it.checked ? 'on' : ''}" onclick="toggleItem(${l.id},${it.id})">${it.checked ? '✓' : ''}</div>
        <div class="sitem-name" id="name-${l.id}-${it.id}" onclick="startEditItem(${l.id},${it.id})">${escHtml(it.name)}</div>
        <button class="sdel" onclick="deleteItem(${l.id},${it.id})" title="删除">×</button>
      </div>`).join('');
  return `<div class="list-card">
    <div class="list-head">
      <div class="list-name"><span class="emoji">🛒</span><span class="txt" id="lname-${l.id}" onclick="startEditList(${l.id})">${escHtml(l.name)}</span><span class="list-count">${remaining}/${l.items.length}</span></div>
      <button class="done-btn" onclick="doneList(${l.id})">✓ 采购完毕</button>
    </div>
    ${items}
    <div class="add-item-row">
      <input class="add-item-input" id="add-input-${l.id}" placeholder="添加物品…"
             onkeydown="if(event.key==='Enter')addItem(${l.id})">
      <button class="add-item-btn" onclick="addItem(${l.id})">＋</button>
    </div>
  </div>`;
}

// ── New list ──
function openNewList() {
  document.getElementById('nl-overlay').classList.add('open');
  setTimeout(() => document.getElementById('nl-name').focus(), 250);
}
async function submitNewList() {
  const inp  = document.getElementById('nl-name');
  const name = inp.value.trim();
  if (!name) { inp.focus(); return; }
  setSyncDot('busy');
  try {
    const l = await slInsertList(name);
    lists.push({ id: Number(l.id), name: l.name, items: [] });
    inp.value = '';
    document.getElementById('nl-overlay').classList.remove('open');
    render();
    setSyncDot('ok');
    const ni = document.getElementById('add-input-' + Number(l.id));
    if (ni) ni.focus();
  } catch(e) { console.error(e); setSyncDot('err'); }
}

// ── Items ──
async function addItem(listId) {
  const inp  = document.getElementById('add-input-' + listId);
  const name = inp.value.trim();
  if (!name) return;
  inp.disabled = true;
  setSyncDot('busy');
  try {
    const list   = lists.find(l => l.id === listId);
    const nextPos = list.items.reduce((m, i) => Math.max(m, i.position), -1) + 1;
    const row    = await siInsertItem(listId, name, nextPos);
    list.items.push({ id: Number(row.id), name: row.name, checked: !!row.checked,
                      position: row.position == null ? nextPos : Number(row.position) });
    setSyncDot('ok');
    render();
    const ni = document.getElementById('add-input-' + listId);
    if (ni) ni.focus();
  } catch(e) { console.error(e); setSyncDot('err'); inp.disabled = false; }
}
async function toggleItem(listId, itemId) {
  const it = lists.find(l => l.id === listId).items.find(i => i.id === itemId);
  it.checked = !it.checked;
  render();
  setSyncDot('busy');
  try { await siToggle(itemId, it.checked); setSyncDot('ok'); }
  catch(e) { console.error(e); setSyncDot('err'); }
}
async function deleteItem(listId, itemId) {
  const list = lists.find(l => l.id === listId);
  list.items = list.items.filter(i => i.id !== itemId);
  render();
  setSyncDot('busy');
  try { await siDeleteItem(itemId); setSyncDot('ok'); }
  catch(e) { console.error(e); setSyncDot('err'); }
}
function startEditItem(listId, itemId) {
  const el = document.getElementById(`name-${listId}-${itemId}`);
  if (!el || el.querySelector('input')) return;
  el.closest('.sitem').setAttribute('draggable', 'false');
  const it  = lists.find(l => l.id === listId).items.find(i => i.id === itemId);
  const cur = it.name;
  el.innerHTML = `<input class="edit-item-input" value="${escHtml(cur)}"
    onkeydown="if(event.key==='Enter'){this.blur()}else if(event.key==='Escape'){this.dataset.cancel='1';this.blur()}"
    onblur="commitEditItem(${listId},${itemId},this)">`;
  const inp = el.querySelector('input');
  inp.focus();
  inp.setSelectionRange(cur.length, cur.length);
}
async function commitEditItem(listId, itemId, inp) {
  const it = lists.find(l => l.id === listId).items.find(i => i.id === itemId);
  const name = inp.value.trim();
  if (inp.dataset.cancel === '1' || !name || name === it.name) { render(); return; }
  it.name = name;
  render();
  setSyncDot('busy');
  try { await siUpdate(itemId, name); setSyncDot('ok'); }
  catch(e) { console.error(e); setSyncDot('err'); }
}
function startEditList(listId) {
  const el = document.getElementById('lname-' + listId);
  if (!el || el.querySelector('input')) return;
  const cur = lists.find(l => l.id === listId).name;
  el.innerHTML = `<input class="edit-list-input" value="${escHtml(cur)}"
    onkeydown="if(event.key==='Enter'){this.blur()}else if(event.key==='Escape'){this.dataset.cancel='1';this.blur()}"
    onblur="commitEditList(${listId},this)">`;
  const inp = el.querySelector('input');
  inp.focus();
  inp.setSelectionRange(cur.length, cur.length);
}
async function commitEditList(listId, inp) {
  const l = lists.find(x => x.id === listId);
  const name = inp.value.trim();
  if (inp.dataset.cancel === '1' || !name || name === l.name) { render(); return; }
  l.name = name;
  render();
  setSyncDot('busy');
  try { await slUpdate(listId, name); setSyncDot('ok'); }
  catch(e) { console.error(e); setSyncDot('err'); }
}
let finishingListId = null;
function doneList(listId) {
  finishingListId = listId;
  const list   = lists.find(l => l.id === listId);
  const bought = list.items.filter(i => i.checked).length;
  const left   = list.items.length - bought;
  document.getElementById('finish-title').textContent = `「${list.name}」采购完毕`;
  const keepBtn = document.getElementById('finish-keep-btn');
  const desc    = document.getElementById('finish-desc');
  if (left > 0) {
    keepBtn.style.display = 'block';
    keepBtn.textContent = `保留未买的 ${left} 项，清除已买 ${bought} 项`;
    desc.textContent = `没买到的 ${left} 项会留在清单里，下次继续采购。`;
  } else {
    keepBtn.style.display = 'none';
    desc.textContent = '所有物品都已买到，可清除整张清单。';
  }
  document.getElementById('finish-overlay').classList.add('open');
}
function closeFinish() {
  document.getElementById('finish-overlay').classList.remove('open');
  finishingListId = null;
}
async function finishKeepUnbought() {
  const listId = finishingListId;
  const list   = lists.find(l => l.id === listId);
  if (!list) { closeFinish(); return; }
  const checkedIds = list.items.filter(i => i.checked).map(i => i.id);
  closeFinish();
  if (!checkedIds.length) return;
  setSyncDot('busy');
  try {
    await siDeleteItems(checkedIds);
    list.items = list.items.filter(i => !i.checked);
    render();
    setSyncDot('ok');
  } catch(e) { console.error(e); setSyncDot('err'); }
}
async function finishClearAll() {
  const listId = finishingListId;
  closeFinish();
  if (listId == null) return;
  setSyncDot('busy');
  try {
    await slDeleteList(listId);
    lists = lists.filter(l => l.id !== listId);
    render();
    setSyncDot('ok');
  } catch(e) { console.error(e); setSyncDot('err'); }
}

// ── Drag to reorder (desktop) ──
let dragCtx = null;
function dragStart(e, listId, itemId) {
  dragCtx = { listId, itemId };
  e.dataTransfer.effectAllowed = 'move';
  try { e.dataTransfer.setData('text/plain', String(itemId)); } catch (_) {}
  e.currentTarget.classList.add('dragging');
}
function dragOver(e, listId) {
  if (!dragCtx || dragCtx.listId !== listId) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const row  = e.currentTarget;
  const rect = row.getBoundingClientRect();
  const after = (e.clientY - rect.top) > rect.height / 2;
  row.classList.remove('drop-before', 'drop-after');
  row.classList.add(after ? 'drop-after' : 'drop-before');
}
function dragLeave(e) { e.currentTarget.classList.remove('drop-before', 'drop-after'); }
function dragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  e.currentTarget.setAttribute('draggable', 'false');
  document.querySelectorAll('.drop-before, .drop-after').forEach(el => el.classList.remove('drop-before', 'drop-after'));
  dragCtx = null;
}
async function dropItem(e, listId, targetId) {
  e.preventDefault();
  const row   = e.currentTarget;
  const after = row.classList.contains('drop-after');
  row.classList.remove('drop-before', 'drop-after');
  if (!dragCtx || dragCtx.listId !== listId || dragCtx.itemId === targetId) return;
  const dragId   = dragCtx.itemId;
  const list     = lists.find(l => l.id === listId);
  const dragItem = list.items.find(i => i.id === dragId);
  const target   = list.items.find(i => i.id === targetId);
  // reorder only within the same checked-group (checked items sit at the bottom)
  const group = displayItems(list).filter(i => i.checked === dragItem.checked && i.id !== dragId);
  let insertIdx;
  if (target.checked === dragItem.checked) {
    const tIdx = group.findIndex(i => i.id === targetId);
    insertIdx = after ? tIdx + 1 : tIdx;
  } else {
    insertIdx = dragItem.checked ? 0 : group.length;   // dropped across the boundary → near edge of own group
  }
  const prev = group[insertIdx - 1];
  const next = group[insertIdx];
  let newPos;
  if      (!prev && !next) newPos = dragItem.position;
  else if (!prev)          newPos = next.position - 1;
  else if (!next)          newPos = prev.position + 1;
  else                     newPos = (prev.position + next.position) / 2;
  dragItem.position = newPos;
  list.items.sort((a, b) => (a.position - b.position) || (a.id - b.id));
  render();
  setSyncDot('busy');
  try { await siPatch(dragId, { position: newPos }); setSyncDot('ok'); }
  catch(err) { console.error(err); setSyncDot('err'); }
}

function overlayClick(e, id) {
  if (e.target.classList.contains('overlay')) document.getElementById(id).classList.remove('open');
}

// ── Boot ──
window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    document.getElementById('lock-screen').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    initApp();
  } else {
    document.getElementById('lock-input').focus();
  }
});
</script>
