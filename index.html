<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家庭账单</title>
  <link rel="preconnect" href="https://mpvsbeghuueffkjdemcr.supabase.co">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f2f2f7; --card: #ffffff; --text: #1c1c1e; --sub: #6c6c70;
      --border: #e5e5ea; --accent: #007aff; --green: #34c759;
      --orange: #ff9500; --red: #ff3b30;
      --shadow: 0 1px 8px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.04);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000; --card: #1c1c1e; --text: #ffffff; --sub: #8e8e93;
        --border: #2c2c2e;
        --shadow: 0 1px 8px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; -webkit-font-smoothing: antialiased;
    }

    /* ── Lock ── */
    #lock-screen {
      position: fixed; inset: 0; background: var(--bg); z-index: 9999;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    #lock-screen.hidden { display: none; }
    .lock-card {
      background: var(--card); border-radius: 22px; padding: 36px 28px 28px;
      width: 100%; max-width: 340px; box-shadow: var(--shadow); text-align: center;
    }
    .lock-icon  { font-size: 48px; margin-bottom: 14px; }
    .lock-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .lock-sub   { font-size: 14px; color: var(--sub); margin-bottom: 26px; }
    .lock-input {
      width: 100%; padding: 14px 16px; border: 1.5px solid var(--border);
      border-radius: 12px; font-size: 18px; font-family: inherit;
      background: var(--bg); color: var(--text); text-align: center;
      letter-spacing: 3px; outline: none; transition: border-color 0.2s; margin-bottom: 12px;
    }
    .lock-input:focus { border-color: var(--accent); }
    .lock-input.error { border-color: var(--red); animation: shake 0.35s ease; }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)}
      40%{transform:translateX(8px)}   60%{transform:translateX(-5px)}
      80%{transform:translateX(5px)}
    }
    .lock-error { font-size: 13px; color: var(--red); margin-bottom: 10px; min-height: 18px; }
    .lock-btn {
      width: 100%; padding: 14px; background: var(--accent); color: #fff;
      border: none; border-radius: 12px; font-size: 16px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: opacity 0.15s;
    }
    .lock-btn:active { opacity: 0.8; }

    /* ── App ── */
    #app { display: none; padding-bottom: 100px; }
    #app.visible { display: block; }

    /* ── Loading ── */
    .loading-wrap {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 60px 20px; color: var(--sub); gap: 14px;
    }
    .spinner {
      width: 28px; height: 28px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Topbar ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(242,242,247,0.85);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--border); padding: 14px 20px 12px;
    }
    @media (prefers-color-scheme: dark) { .topbar { background: rgba(0,0,0,0.85); } }
    .topbar-inner {
      max-width: 600px; margin: 0 auto;
      display: flex; justify-content: space-between; align-items: center;
    }
    .topbar h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .topbar-actions { display: flex; gap: 8px; }
    .icon-btn {
      background: none; border: none; cursor: pointer; color: var(--accent);
      font-size: 14px; font-weight: 500; padding: 5px 10px; border-radius: 8px;
      transition: background 0.15s;
    }
    .icon-btn:hover { background: rgba(0,122,255,0.1); }
    .sync-dot {
      display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      margin-left: 6px; vertical-align: middle; transition: background 0.3s;
    }
    .sync-dot.ok   { background: var(--green); }
    .sync-dot.busy { background: var(--orange); animation: pulse 1s infinite; }
    .sync-dot.err  { background: var(--red); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── Container ── */
    .wrap { max-width: 600px; margin: 0 auto; padding: 16px 16px 0; }

    /* ── Summary ── */
    .summary {
      background: var(--card); border-radius: 18px; padding: 20px;
      margin-bottom: 16px; box-shadow: var(--shadow);
    }
    .summary-cycle {
      font-size: 12px; color: var(--sub); font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 14px;
    }
    .transfer-hero {
      border-radius: 13px; padding: 16px 20px; text-align: center;
      margin-bottom: 18px; transition: background 0.3s;
    }
    .transfer-hero.pay     { background: linear-gradient(135deg, rgba(0,122,255,0.1),  rgba(0,122,255,0.05)); }
    .transfer-hero.receive { background: linear-gradient(135deg, rgba(52,199,89,0.1),  rgba(52,199,89,0.05)); }
    .transfer-label { font-size: 12px; color: var(--sub); margin-bottom: 4px; }
    .transfer-big { font-size: 40px; font-weight: 700; letter-spacing: -1px; line-height: 1.1; }
    .transfer-big.pay     { color: var(--accent); }
    .transfer-big.receive { color: var(--green); }
    .transfer-big .sym    { font-size: 24px; }
    .transfer-note { font-size: 11px; color: var(--sub); margin-top: 4px; }
    .breakdown { display: flex; flex-direction: column; gap: 9px; }
    .brow { display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
    .brow .lbl { display: flex; align-items: center; gap: 7px; color: var(--sub); }
    .brow .val { font-weight: 500; font-variant-numeric: tabular-nums; }
    .brow .val.positive { color: var(--green); }
    .brow .val.negative { color: var(--red); }
    .brow .val.neutral  { color: var(--text); }
    .bdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ── Add button ── */
    .add-row { margin-bottom: 16px; }
    .add-main-btn {
      width: 100%; padding: 15px; background: var(--card);
      border: 1.5px dashed rgba(0,122,255,0.45); border-radius: 14px;
      color: var(--accent); font-size: 15px; font-weight: 600; font-family: inherit;
      cursor: pointer; box-shadow: var(--shadow);
      display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: background 0.15s, border-color 0.15s;
    }
    .add-main-btn:hover  { background: rgba(0,122,255,0.05); border-color: var(--accent); }
    .add-main-btn:active { opacity: 0.7; }
    .add-main-btn .plus  { font-size: 20px; line-height: 1; }

    /* ── List ── */
    .date-group { margin-bottom: 14px; }
    .date-label { font-size: 12px; font-weight: 600; color: var(--sub); padding: 0 4px 8px; letter-spacing: 0.2px; }
    .items-card { background: var(--card); border-radius: 14px; overflow: hidden; box-shadow: var(--shadow); }
    .item { display: flex; align-items: center; padding: 11px 14px; gap: 11px; }
    .item:not(:last-child) { border-bottom: 1px solid var(--border); }
    .item-dot    { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .item-body   { flex: 1; min-width: 0; }
    .item-desc   { font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-tag    { font-size: 11px; color: var(--sub); margin-top: 2px; }
    .item-right  { text-align: right; flex-shrink: 0; }
    .item-amount { font-size: 15px; font-weight: 500; font-variant-numeric: tabular-nums; }
    .item-share  { font-size: 11px; color: var(--sub); margin-top: 2px; }
    .item-actions { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
    .edit-btn {
      background: none; border: none; cursor: pointer; color: var(--sub);
      font-size: 15px; line-height: 1; padding: 4px 6px; border-radius: 6px;
      opacity: 0.4; transition: opacity 0.15s, color 0.15s;
    }
    .edit-btn:hover { opacity: 1; color: var(--accent); }
    .del-btn {
      background: none; border: none; cursor: pointer; color: var(--sub);
      font-size: 20px; line-height: 1; padding: 4px 6px; border-radius: 6px;
      opacity: 0.4; transition: opacity 0.15s, color 0.15s;
    }
    .del-btn:hover { opacity: 1; color: var(--red); }

    /* ── Empty ── */
    .empty { text-align: center; padding: 48px 20px; color: var(--sub); }
    .empty-icon { font-size: 44px; margin-bottom: 12px; }
    .empty-text { font-size: 15px; }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: 28px; right: 24px;
      width: 58px; height: 58px; border-radius: 50%;
      background: var(--accent); border: none; cursor: pointer;
      color: #fff; font-size: 30px; line-height: 1;
      box-shadow: 0 4px 20px rgba(0,122,255,0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; transition: transform 0.15s, box-shadow 0.15s;
    }
    .fab:active { transform: scale(0.93); box-shadow: 0 2px 10px rgba(0,122,255,0.35); }

    /* ── Sheet ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 400;
      display: flex; align-items: flex-end;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }
    .sheet {
      background: var(--card); border-radius: 20px 20px 0 0;
      padding: 12px 20px 32px; width: 100%; max-width: 600px; margin: 0 auto;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 90vh; overflow-y: auto;
    }
    .overlay.open .sheet { transform: translateY(0); }
    .handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
    .sheet-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }

    /* ── Form ── */
    .fgrp { margin-bottom: 14px; }
    .flabel { display: block; font-size: 12px; font-weight: 600; color: var(--sub); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 7px; }
    .finput {
      width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
      border-radius: 11px; font-size: 16px; font-family: inherit;
      background: var(--bg); color: var(--text); outline: none; transition: border-color 0.2s;
    }
    .finput:focus { border-color: var(--accent); }
    .seg { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .seg input[type=radio] { display: none; }
    .seg-lbl {
      display: block; padding: 10px 6px 9px; border: 1.5px solid var(--border);
      border-radius: 11px; text-align: center; cursor: pointer;
      font-size: 13px; line-height: 1.35;
      transition: border-color 0.2s, background 0.2s, color 0.2s; user-select: none;
    }
    .seg-lbl small { display: block; font-size: 10px; opacity: 0.65; margin-top: 2px; }
    .seg input[type=radio]:checked + .seg-lbl {
      border-color: var(--accent); background: rgba(0,122,255,0.08);
      color: var(--accent); font-weight: 600;
    }
    .submit {
      width: 100%; padding: 14px; background: var(--accent); color: #fff;
      border: none; border-radius: 13px; font-size: 16px; font-weight: 600;
      font-family: inherit; cursor: pointer; margin-top: 10px; transition: opacity 0.15s;
    }
    .submit:active   { opacity: 0.8; }
    .submit:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Settings ── */
    .srow { display: flex; align-items: center; justify-content: space-between; padding: 13px 0; border-bottom: 1px solid var(--border); }
    .srow:last-of-type { border-bottom: none; }
    .srow-lbl { font-size: 15px; }
    .srow-lbl small { display: block; font-size: 12px; color: var(--sub); margin-top: 2px; }
    .sinput {
      width: 110px; padding: 8px 12px; border: 1.5px solid var(--border);
      border-radius: 9px; font-size: 15px; font-family: inherit; text-align: right;
      background: var(--bg); color: var(--text); outline: none;
    }
    .sinput:focus { border-color: var(--accent); }
    .danger-zone { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
    .danger-title { font-size: 12px; font-weight: 600; color: var(--sub); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .danger-btn {
      width: 100%; padding: 12px; background: rgba(255,59,48,0.1); color: var(--red);
      border: none; border-radius: 11px; font-size: 15px; font-weight: 500;
      font-family: inherit; cursor: pointer;
    }
    .danger-btn:hover { background: rgba(255,59,48,0.18); }

    /* ── Confirm ── */
    .confirm-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500;
      display: flex; align-items: center; justify-content: center; padding: 20px;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .confirm-overlay.open { opacity: 1; pointer-events: all; }
    .confirm-box {
      background: var(--card); border-radius: 18px; padding: 28px 22px 22px;
      width: 100%; max-width: 300px; transform: scale(0.88);
      transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .confirm-overlay.open .confirm-box { transform: scale(1); }
    .confirm-icon  { font-size: 36px; text-align: center; margin-bottom: 10px; }
    .confirm-title { font-size: 17px; font-weight: 700; text-align: center; margin-bottom: 6px; }
    .confirm-desc  { font-size: 14px; color: var(--sub); text-align: center; margin-bottom: 22px; line-height: 1.45; }
    .confirm-btns  { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .cbtn-cancel {
      padding: 13px; background: var(--bg); border: none; border-radius: 12px;
      font-size: 15px; font-weight: 500; font-family: inherit; cursor: pointer; color: var(--text);
    }
    .cbtn-delete {
      padding: 13px; background: rgba(255,59,48,0.12); border: none; border-radius: 12px;
      font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; color: var(--red);
    }
    .cbtn-delete:hover { background: rgba(255,59,48,0.2); }

    /* ── Undo Toast ── */
    .undo-toast {
      position: fixed; bottom: 104px; left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: #2c2c2e; color: #fff; border-radius: 14px; padding: 12px 16px;
      display: flex; align-items: center; gap: 14px; font-size: 14px; white-space: nowrap;
      z-index: 600; opacity: 0; pointer-events: none;
      transition: opacity 0.22s, transform 0.22s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.35);
    }
    @media (prefers-color-scheme: dark) { .undo-toast { background: #3a3a3c; } }
    .undo-toast.show { opacity: 1; pointer-events: all; transform: translateX(-50%) translateY(0); }
    .undo-text { flex: 1; }
    .undo-btn  { background: none; border: none; cursor: pointer; color: #4da1ff; font-size: 14px; font-weight: 700; font-family: inherit; padding: 0; white-space: nowrap; }

    /* ── Cycle action (settings) ── */
    .cycle-btn {
      width: 100%; padding: 12px; background: rgba(0,122,255,0.1); color: var(--accent);
      border: none; border-radius: 11px; font-size: 15px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: background 0.15s;
    }
    .cycle-btn:hover { background: rgba(0,122,255,0.18); }
    .cycle-hint { font-size: 12px; color: var(--sub); margin-top: 9px; line-height: 1.5; }

    /* ── Left Drawer (往期记录) ── */
    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 400;
      display: flex; opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: all; }
    .drawer {
      background: var(--card); width: 84%; max-width: 360px; height: 100%;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      display: flex; flex-direction: column; overflow-y: auto;
      box-shadow: 4px 0 24px rgba(0,0,0,0.18);
    }
    .drawer-overlay.open .drawer { transform: translateX(0); }
    .drawer-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 18px 14px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--card); z-index: 1;
    }
    .drawer-title { font-size: 18px; font-weight: 700; }
    .drawer-close { background: none; border: none; font-size: 17px; color: var(--sub); cursor: pointer; padding: 4px 8px; }
    .cyc-item { padding: 15px 18px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
    .cyc-item:hover { background: var(--bg); }
    .cyc-range { font-size: 15px; font-weight: 600; }
    .cyc-meta  { font-size: 12px; color: var(--sub); margin-top: 5px; display: flex; justify-content: space-between; align-items: center; }
    .cyc-transfer { font-weight: 700; font-variant-numeric: tabular-nums; }
    .cyc-empty { padding: 48px 24px; text-align: center; color: var(--sub); font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-card">
    <div class="lock-icon">🏠</div>
    <div class="lock-title">家庭账单</div>
    <div class="lock-sub">请输入密码以继续</div>
    <input type="password" class="lock-input" id="lock-input"
           placeholder="••••••••" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')unlock()">
    <div class="lock-error" id="lock-error"></div>
    <button class="lock-btn" onclick="unlock()">进入</button>
  </div>
</div>

<div id="app">
  <header class="topbar">
    <div class="topbar-inner">
      <h1>家庭账单<span class="sync-dot ok" id="sync-dot"></span></h1>
      <div class="topbar-actions">
        <button class="icon-btn" onclick="openDrawer()">☰ 往期</button>
        <a class="icon-btn" href="shopping.html" style="text-decoration:none;display:inline-block">🛒 购物</a>
        <button class="icon-btn" onclick="openSettings()">设置</button>
        <button class="icon-btn" onclick="lockApp()">锁定</button>
      </div>
    </div>
  </header>

  <div class="wrap">
    <div class="summary">
      <div class="summary-cycle" id="cycle-label">本期账单</div>
      <div class="transfer-hero pay" id="hero">
        <div class="transfer-label" id="hero-label">本月应转给宝宝</div>
        <div class="transfer-big pay" id="hero-amount"><span class="sym">$</span><span id="hero-num">—</span></div>
        <div class="transfer-note" id="hero-note">AUD</div>
      </div>
      <div class="breakdown">
        <div class="brow" id="b-carry-row" style="display:none">
          <span class="lbl"><span class="bdot" style="background:var(--sub)"></span><span id="b-carry-lbl">上期结余</span></span>
          <span class="val" id="b-carry">—</span>
        </div>
        <div class="brow">
          <span class="lbl"><span class="bdot" style="background:var(--accent)"></span>我的租金份额</span>
          <span class="val neutral" id="b-rent">—</span>
        </div>
        <div class="brow">
          <span class="lbl"><span class="bdot" style="background:var(--green)"></span>共同开支（全额）</span>
          <span class="val neutral" id="b-shared-total">—</span>
        </div>
        <div class="brow" style="padding-left:15px">
          <span class="lbl">└ 其中抵扣（÷2）</span>
          <span class="val positive" id="b-shared-half">—</span>
        </div>
        <div class="brow">
          <span class="lbl"><span class="bdot" style="background:var(--orange)"></span>替宝宝垫付（全额抵扣）</span>
          <span class="val positive" id="b-partner-paid">—</span>
        </div>
        <div class="brow">
          <span class="lbl"><span class="bdot" style="background:var(--red)"></span>宝宝替我垫付</span>
          <span class="val negative" id="b-covered">—</span>
        </div>
      </div>
    </div>

    <div class="add-row">
      <button class="add-main-btn" onclick="openAdd()">
        <span class="plus">＋</span> 添加开支
      </button>
    </div>

    <div id="list"></div>
    <div class="empty" id="empty" style="display:none">
      <div class="empty-icon">📋</div>
      <div class="empty-text">暂无记录<br>点击上方按钮添加开支</div>
    </div>
  </div>
</div>

<!-- Add / Edit Sheet -->
<div class="overlay" id="add-overlay" onclick="overlayClick(event,'add-overlay')">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title" id="add-sheet-title">添加开支</div>
    <div class="fgrp">
      <label class="flabel">日期</label>
      <input type="date" class="finput" id="f-date">
    </div>
    <div class="fgrp">
      <label class="flabel">金额 (AUD)</label>
      <input type="number" class="finput" id="f-amount" placeholder="0.00" step="0.01" min="0.01" inputmode="decimal">
    </div>
    <div class="fgrp">
      <label class="flabel">描述</label>
      <input type="text" class="finput" id="f-desc" placeholder="grocery / petrol / ...">
    </div>
    <div class="fgrp">
      <label class="flabel">类型</label>
      <div class="seg">

<script>
// ── Supabase REST (no SDK) ──
const API = 'https://mpvsbeghuueffkjdemcr.supabase.co/rest/v1';

const H   = { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json' };

async function dbGet(cycleId) {
  const filter = cycleId != null ? `&cycle_id=eq.${cycleId}` : '';
  const r = await fetch(`${API}/expenses?select=*${filter}&order=date.asc,id.asc`, { headers: H });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function dbInsert(rows) {
  const body = Array.isArray(rows) ? rows : [rows];
  const r = await fetch(`${API}/expenses`, {
    method: 'POST', headers: { ...H, 'Prefer': 'return=representation' },
    body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function dbUpdate(id, row) {
  const r = await fetch(`${API}/expenses?id=eq.${id}`, {
    method: 'PATCH', headers: { ...H, 'Prefer': 'return=representation' },
    body: JSON.stringify(row),
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function dbDelete(id) {
  const r = await fetch(`${API}/expenses?id=eq.${id}`, { method: 'DELETE', headers: H });

}

  const r = await fetch(`${API}/cycles`, {

  if (!r.ok) throw new Error(await r.text());
  return (await r.json())[0];
}
async function dbUpdateCycle(id, row) {
  const r = await fetch(`${API}/cycles?id=eq.${id}`, {
    method: 'PATCH', headers: { ...H, 'Prefer': 'return=representation' },
    body: JSON.stringify(row),

async function sha256(s) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function unlock() {
  const inp = document.getElementById('lock-input');
  const err = document.getElementById('lock-error');
  if (!inp.value) { err.textContent = '请输入密码'; return; }
  if (await sha256(inp.value) === PWD_HASH) {
    sessionStorage.setItem(SESSION_KEY, '1');
    document.getElementById('lock-screen').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    err.textContent = '';
    initApp();
  } else {
    err.textContent = '密码错误，请重试';
    inp.classList.add('error');
    inp.value = '';
    setTimeout(() => inp.classList.remove('error'), 400);
  }
}

  sessionStorage.removeItem(SESSION_KEY);

// ── Seed ──
const SEED = [
  {id:1,  date:"2026-05-22",amount:40.78, description:"wine",           type:"shared"},
  {id:2,  date:"2026-05-22",amount:14.45, description:"grocery",        type:"shared"},

];

// ── State ──
let expenses     = [];
let activeCycle  = null;   // 当前活跃账期 { id, label, start_date, carryover, ... }
let cfg          = { myRent: 1250, rentDay: 22 };
let editingId    = null;
let pendingDelId = null;
let pendingDelRow = null;
let undoTimer    = null;

const toLocal = r => ({ id: Number(r.id), date: r.date, amount: parseFloat(r.amount), desc: r.description, type: r.type });
const toDB    = e => ({ id: e.id, date: e.date, amount: e.amount, description: e.desc, type: e.type, cycle_id: activeCycle ? activeCycle.id : null });

// ── Sync dot ──
function setSyncDot(s) {
  const d = document.getElementById('sync-dot');
  d.className = 'sync-dot ' + s;
}

// ── Init ──
async function initApp() {
  showLoading(true);
  loadCfg();
  await loadExpenses();
  startPolling();
  showLoading(false);
}

function showLoading(on) {
  if (on) {
    document.getElementById('list').innerHTML =
      '<div class="loading-wrap"><div class="spinner"></div><span>加载中...</span></div>';
    document.getElementById('empty').style.display = 'none';
  }
}

async function loadExpenses() {
  setSyncDot('busy');
  try {
    activeCycle = await dbGetActiveCycle();
    if (!activeCycle) {
      // 全新数据库：引导建立首期账期并写入种子数据
      activeCycle = await dbInsertCycle({ label: '首期账单', start_date: SEED[0].date, status: 'active', carryover: 0 });
      const seeded = SEED.map(s => ({ ...s, cycle_id: activeCycle.id }));
      const inserted = await dbInsert(seeded);
      expenses = inserted.map(toLocal);
    } else {
      const data = await dbGet(activeCycle.id);
      expenses = data.map(toLocal);
    }
    setSyncDot('ok');
    render();
  } catch(e) {
    console.error(e);
    setSyncDot('err');
  }
}

// Poll every 30s — follow the active cycle, only re-render on change
function startPolling() {
  setInterval(async () => {
    if (document.visibilityState !== 'visible') return;
    try {
      const ac = await dbGetActiveCycle();
      if (!ac) { setSyncDot('err'); return; }
      const cycleChanged = !activeCycle || ac.id !== activeCycle.id
        || parseFloat(ac.carryover || 0) !== parseFloat(activeCycle.carryover || 0);
      activeCycle = ac;
      const data = await dbGet(ac.id);
      const sig = d => d.map(r => `${r.id}:${r.amount}:${r.description}:${r.type}:${r.date}`).join('|');
      if (cycleChanged || sig(data) !== sig(expenses.map(toDB))) {
        expenses = data.map(toLocal);
        render();
      }
      setSyncDot('ok');
    } catch(e) { setSyncDot('err'); }
  }, 30000);
}

// ── Config ──
function loadCfg() {
  const raw = localStorage.getItem(SET_KEY);
  if (raw) cfg = { ...cfg, ...JSON.parse(raw) };
}
function saveCfg() { localStorage.setItem(SET_KEY, JSON.stringify(cfg)); }

// ── Calc ──
function calc() {
  let shared = 0, pp = 0, cp = 0;
  expenses.forEach(e => {
    if      (e.type === 'shared')           shared += e.amount;
    else if (e.type === 'partner_personal') pp     += e.amount;
    else if (e.type === 'partner_paid')     cp     += e.amount;
  });
  const carryover = activeCycle ? parseFloat(activeCycle.carryover || 0) : 0;
  return { shared, pp, cp, carryover, transfer: carryover + cfg.myRent - shared / 2 - pp + cp };
}

// ── Format ──
const fmt = n => Math.abs(n).toLocaleString('en-AU', { minimumFractionDigits:2, maximumFractionDigits:2 });
function fmtDate(ds) {
  const d  = new Date(ds + 'T12:00:00');
  const mo = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const wk = ['周日','周一','周二','周三','周四','周五','周六'];
  return `${mo[d.getMonth()]}${d.getDate()}日 · ${wk[d.getDay()]}`;
}

// ── Render ──
function renderSummary() {
  const { shared, pp, cp, carryover, transfer } = calc();
  const recv = transfer < 0;
  document.getElementById('hero').className          = 'transfer-hero ' + (recv ? 'receive' : 'pay');
  document.getElementById('hero-amount').className   = 'transfer-big '  + (recv ? 'receive' : 'pay');
  document.getElementById('hero-label').textContent  = recv ? '本月宝宝需还给你' : '本月应转给宝宝';
  document.getElementById('hero-num').textContent    = fmt(transfer);
  document.getElementById('hero-note').textContent   = 'AUD · 下次租金日（' + cfg.rentDay + '日）';
  document.getElementById('cycle-label').textContent = `本期账单（${cfg.rentDay}日结算）· 共 ${expenses.length} 笔`;
  const carryRow = document.getElementById('b-carry-row');
  if (Math.abs(carryover) >= 0.005) {
    carryRow.style.display = 'flex';
    document.getElementById('b-carry-lbl').textContent = carryover < 0 ? '上期宝宝欠你（抵减）' : '上期你欠宝宝（累加）';
    const cv = document.getElementById('b-carry');
    cv.textContent = (carryover < 0 ? '-$' : '+$') + fmt(carryover);
    cv.className   = 'val ' + (carryover < 0 ? 'positive' : 'negative');
  } else {
    carryRow.style.display = 'none';
  }
  document.getElementById('b-rent').textContent          = `$${fmt(cfg.myRent)}`;
  document.getElementById('b-shared-total').textContent  = `$${fmt(shared)}`;
  document.getElementById('b-shared-half').textContent   = `-$${fmt(shared / 2)}`;
  document.getElementById('b-partner-paid').textContent  = pp > 0 ? `-$${fmt(pp)}` : '$0.00';
  document.getElementById('b-covered').textContent       = cp > 0 ? `+$${fmt(cp)}` : '$0.00';
}

const TYPE_META = {
  shared:           { dot:'var(--green)',  tag:'共同分担'   },
  partner_personal: { dot:'var(--orange)', tag:'替宝宝垫付' },
  partner_paid:     { dot:'var(--red)',    tag:'宝宝替我垫' },
};
function itemRowHtml(e, readonly) {
  const t = TYPE_META[e.type];
  const amtTxt   = e.type === 'partner_paid' ? `−$${fmt(e.amount)}` : `$${fmt(e.amount)}`;
  const shareTxt = e.type === 'shared' ? `各付 $${fmt(e.amount/2)}` : e.type === 'partner_personal' ? '全额抵扣' : '全额增加';
  const actions  = readonly ? '' : `<div class="item-actions">
          <button class="edit-btn" onclick="openEdit(${e.id})" title="编辑">✎</button>
          <button class="del-btn"  onclick="askDel(${e.id})"  title="删除">×</button>
        </div>`;
  return `<div class="item">
        <span class="item-dot" style="background:${t.dot}"></span>
        <div class="item-body">
          <div class="item-desc">${escHtml(e.desc)}</div>
          <div class="item-tag">${t.tag}</div>
        </div>
        <div class="item-right">
          <div class="item-amount">${amtTxt}</div>
          <div class="item-share">${shareTxt}</div>
        </div>${actions}
      </div>`;
}
function groupedListHtml(exps, readonly) {
  const map = {};
  exps.forEach(e => { (map[e.date] = map[e.date] || []).push(e); });
  const dates = Object.keys(map).sort((a,b) => b < a ? -1 : 1);
  return dates.map(date =>
    `<div class="date-group"><div class="date-label">${fmtDate(date)}</div><div class="items-card">${map[date].map(e => itemRowHtml(e, readonly)).join('')}</div></div>`
  ).join('');
}

function renderList() {
  const listEl  = document.getElementById('list');
  const emptyEl = document.getElementById('empty');
  if (expenses.length === 0) { listEl.innerHTML = ''; emptyEl.style.display = 'block'; return; }
  emptyEl.style.display = 'none';
  listEl.innerHTML = groupedListHtml(expenses, false);
}

function render() { renderSummary(); renderList(); }

// ── Add / Edit ──
function openAdd() {
  editingId = null;
  document.getElementById('f-date').value   = new Date().toISOString().split('T')[0];
  document.getElementById('f-amount').value = '';
  document.getElementById('f-desc').value   = '';
  document.getElementById('ft-shared').checked = true;
  document.getElementById('add-sheet-title').textContent = '添加开支';
  document.getElementById('add-submit-btn').textContent  = '添加';
  document.getElementById('add-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-amount').focus(), 350);
}
function openEdit(id) {
  const e = expenses.find(x => x.id === id);
  if (!e) return;
  editingId = id;
  document.getElementById('f-date').value   = e.date;
  document.getElementById('f-amount').value = e.amount;
  document.getElementById('f-desc').value   = e.desc;
  document.querySelector(`input[name="ftype"][value="${e.type}"]`).checked = true;
  document.getElementById('add-sheet-title').textContent = '编辑开支';
  document.getElementById('add-submit-btn').textContent  = '保存修改';
  document.getElementById('add-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-amount').focus(), 350);
}
function closeAdd() { editingId = null; document.getElementById('add-overlay').classList.remove('open'); }

async function submitExpense() {
  const date   = document.getElementById('f-date').value;
  const amount = parseFloat(document.getElementById('f-amount').value);
  const desc   = document.getElementById('f-desc').value.trim();
  const type   = document.querySelector('input[name="ftype"]:checked').value;
  if (!date || !amount || amount <= 0 || !desc) { alert('请填写所有字段'); return; }
  const btn = document.getElementById('add-submit-btn');
  btn.disabled = true; setSyncDot('busy');
  try {
    if (editingId !== null) {
      await dbUpdate(editingId, { date, amount, description: desc, type });
      const idx = expenses.findIndex(x => x.id === editingId);
      if (idx !== -1) expenses[idx] = { id: editingId, date, amount, desc, type };
    } else {
      const newId = Date.now();
      await dbInsert({ id: newId, date, amount, description: desc, type, cycle_id: activeCycle ? activeCycle.id : null });
      expenses.push({ id: newId, date, amount, desc, type });
    }
    setSyncDot('ok'); render(); closeAdd();
  } catch(e) { console.error(e); setSyncDot('err'); }
  btn.disabled = false;
}

// ── Delete ──
function askDel(id) {
  const e = expenses.find(x => x.id === id);
  if (!e) return;
  pendingDelId = id;
  document.getElementById('confirm-desc').textContent = `「${e.desc}」$${fmt(e.amount)}`;
  document.getElementById('confirm-overlay').classList.add('open');
}
function cancelDel() { pendingDelId = null; document.getElementById('confirm-overlay').classList.remove('open'); }

async function confirmDel() {
  const e = expenses.find(x => x.id === pendingDelId);
  if (!e) { cancelDel(); return; }
  pendingDelRow = toDB(e);
  setSyncDot('busy');
  try {
    await dbDelete(pendingDelId);
    expenses = expenses.filter(x => x.id !== pendingDelId);
    pendingDelId = null;
    setSyncDot('ok'); render();
    document.getElementById('confirm-overlay').classList.remove('open');
    showUndoToast(e.desc);
  } catch(err) { console.error(err); setSyncDot('err'); }
}

async function undoDel() {
  if (!pendingDelRow) return;
  setSyncDot('busy');
  try {
    await dbInsert(pendingDelRow);
    expenses.push(toLocal(pendingDelRow));
    expenses.sort((a,b) => a.date < b.date ? -1 : a.date > b.date ? 1 : a.id - b.id);
    pendingDelRow = null;
    setSyncDot('ok'); render(); hideUndoToast();
  } catch(e) { console.error(e); setSyncDot('err'); }
}

function showUndoToast(desc) {
  clearTimeout(undoTimer);
  document.getElementById('undo-text').textContent = `已删除「${desc}」`;
  document.getElementById('undo-toast').classList.add('show');
  undoTimer = setTimeout(hideUndoToast, 5000);
}
function hideUndoToast() { clearTimeout(undoTimer); document.getElementById('undo-toast').classList.remove('show'); }

// ── Settings ──
function openSettings() {
  document.getElementById('s-myrent').value  = cfg.myRent;
  document.getElementById('s-rentday').value = cfg.rentDay;
  document.getElementById('set-overlay').classList.add('open');
}
function saveSettings() {
  const myRent  = parseFloat(document.getElementById('s-myrent').value);
  const rentDay = parseInt(document.getElementById('s-rentday').value);
  if (!myRent || !rentDay || rentDay < 1 || rentDay > 31) { alert('请填写有效的设置值'); return; }
  cfg = { myRent, rentDay }; saveCfg(); render();
  document.getElementById('set-overlay').classList.remove('open');
}
async function newCycle() {
  if (!activeCycle) { alert('账期尚未初始化，请刷新页面重试'); return; }
  const { transfer } = calc();
  const recv = transfer < 0;
  const msg = recv
    ? `本期结算：宝宝欠你 $${fmt(transfer)}。\n归档后这笔金额会滚入新账期，下期你少转这么多。\n本期 ${expenses.length} 笔明细将保存到「往期记录」。确定吗？`
    : `本期结算：你应转给宝宝 $${fmt(transfer)}。\n归档后这笔金额会滚入新账期。\n本期 ${expenses.length} 笔明细将保存到「往期记录」。确定吗？`;
  if (!confirm(msg)) return;
  setSyncDot('busy');
  try {
    const today = new Date().toISOString().split('T')[0];
    await dbUpdateCycle(activeCycle.id, { status: 'archived', end_date: today, transfer });
    activeCycle = await dbInsertCycle({ label: cycleLabel(today), start_date: today, status: 'active', carryover: transfer });
    expenses = [];
    setSyncDot('ok'); render();
    document.getElementById('set-overlay').classList.remove('open');
  } catch(e) { console.error(e); setSyncDot('err'); }
}

function cycleLabel(startDate) {
  const d = new Date(startDate + 'T12:00:00');
  return `${d.getMonth() + 1}月账期`;
}
function fmtShort(ds) {
  if (!ds) return '';
  const d = new Date(ds + 'T12:00:00');
  return `${d.getMonth() + 1}/${d.getDate()}`;
}
function cycRange(c) {
  return `${fmtShort(c.start_date) || '—'} – ${c.end_date ? fmtShort(c.end_date) : '至今'}`;
}

// ── 往期记录 抽屉 ──
async function openDrawer() {
  document.getElementById('drawer-overlay').classList.add('open');
  const body = document.getElementById('drawer-body');
  body.innerHTML = '<div class="loading-wrap"><div class="spinner"></div><span>加载中...</span></div>';
  try {
    const cycles = await dbGetArchivedCycles();
    if (!cycles.length) {
      body.innerHTML = '<div class="cyc-empty">暂无往期账单<br>归档当前账期后<br>历史记录会出现在这里</div>';
      return;
    }
    body.innerHTML = cycles.map(c => {
      const t = parseFloat(c.transfer || 0);
      const recv = t < 0;
      const tTxt = (recv ? '宝宝还 ' : '应转 ') + '$' + fmt(t);
      return `<div class="cyc-item" onclick="openHistory(${c.id})">
        <div class="cyc-range">${cycRange(c)}</div>
        <div class="cyc-meta">
          <span>${escHtml(c.label || '')}</span>
          <span class="cyc-transfer" style="color:${recv ? 'var(--green)' : 'var(--accent)'}">${tTxt}</span>
        </div>
      </div>`;
    }).join('');
  } catch(e) { console.error(e); body.innerHTML = '<div class="cyc-empty">加载失败，请重试</div>'; }
}
function closeDrawer() { document.getElementById('drawer-overlay').classList.remove('open'); }

// ── 历史账期详情（只读）──
async function openHistory(cycleId) {
  document.getElementById('hist-overlay').classList.add('open');
  const body = document.getElementById('hist-body');
  body.innerHTML = '<div class="loading-wrap"><div class="spinner"></div><span>加载中...</span></div>';
  try {
    const [rows, cycles] = await Promise.all([ dbGet(cycleId), dbGetArchivedCycles() ]);
    const cyc  = cycles.find(c => c.id === cycleId);
    const exps = rows.map(toLocal);
    document.getElementById('hist-title').textContent = cyc ? cycRange(cyc) : '账期详情';
    body.innerHTML = historySummaryHtml(cyc, exps) +
      (exps.length ? groupedListHtml(exps, true) : '<div class="cyc-empty">本期无开支记录</div>');
  } catch(e) { console.error(e); body.innerHTML = '<div class="cyc-empty">加载失败，请重试</div>'; }
}
function historySummaryHtml(cyc, exps) {
  let shared = 0, pp = 0, cp = 0;
  exps.forEach(e => {
    if      (e.type === 'shared')           shared += e.amount;
    else if (e.type === 'partner_personal') pp     += e.amount;
    else if (e.type === 'partner_paid')     cp     += e.amount;
  });
  const carry    = cyc ? parseFloat(cyc.carryover || 0) : 0;
  const transfer = cyc && cyc.transfer != null ? parseFloat(cyc.transfer) : (carry + cfg.myRent - shared/2 - pp + cp);
  const rentUsed = transfer - carry + shared/2 + pp - cp;   // 还原归档时的租金份额，保证明细与结算额自洽
  const recv = transfer < 0;
  const carryRow = Math.abs(carry) >= 0.005
    ? `<div class="brow"><span class="lbl"><span class="bdot" style="background:var(--sub)"></span>${carry < 0 ? '上期宝宝欠你（抵减）' : '上期你欠宝宝（累加）'}</span><span class="val ${carry < 0 ? 'positive' : 'negative'}">${carry < 0 ? '-$' : '+$'}${fmt(carry)}</span></div>`
    : '';
  return `<div class="summary" style="margin:0 0 14px">
    <div class="transfer-hero ${recv ? 'receive' : 'pay'}">
      <div class="transfer-label">${recv ? '宝宝需还给你' : '当期应转给宝宝'}</div>
      <div class="transfer-big ${recv ? 'receive' : 'pay'}"><span class="sym">$</span>${fmt(transfer)}</div>
      <div class="transfer-note">AUD · 已结算</div>
    </div>
    <div class="breakdown">
      ${carryRow}
      <div class="brow"><span class="lbl"><span class="bdot" style="background:var(--accent)"></span>我的租金份额</span><span class="val neutral">$${fmt(rentUsed)}</span></div>
      <div class="brow"><span class="lbl"><span class="bdot" style="background:var(--green)"></span>共同开支（全额）</span><span class="val neutral">$${fmt(shared)}</span></div>
      <div class="brow" style="padding-left:15px"><span class="lbl">└ 其中抵扣（÷2）</span><span class="val positive">-$${fmt(shared/2)}</span></div>
      <div class="brow"><span class="lbl"><span class="bdot" style="background:var(--orange)"></span>替宝宝垫付（全额抵扣）</span><span class="val positive">${pp > 0 ? '-$' + fmt(pp) : '$0.00'}</span></div>
      <div class="brow"><span class="lbl"><span class="bdot" style="background:var(--red)"></span>宝宝替我垫付</span><span class="val negative">${cp > 0 ? '+$' + fmt(cp) : '$0.00'}</span></div>
    </div>
  </div>`;
}

function overlayClick(e, id) {
  if (e.target.classList.contains('overlay')) document.getElementById(id).classList.remove('open');
}
function overlayClick2(e, id) {
  if (e.target.classList.contains('drawer-overlay')) document.getElementById(id).classList.remove('open');
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Boot ──
if (sessionStorage.getItem(SESSION_KEY) === '1') {
  document.getElementById('lock-screen').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  initApp();
}
</script>
</body>
</html>
